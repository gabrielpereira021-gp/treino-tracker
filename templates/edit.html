<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>Editar Treino</title>
</head>
<body>
    <h1>Editar Treino</h1>
    <form action="{{ url_for('edit_treino_app', id=treino.id) }}" method="POST">
        <input type="date" name="data" value="{{ treino.data }}" required>
        <input type="text" name="tipo" value="{{ treino.tipo }}" required maxlength="50">
        <input type="number" name="duracao" value="{{ treino.duracao }}" required min="1">
        <input type="text" name="descricao" value="{{ treino.descricao }}" required maxlength="200">
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
